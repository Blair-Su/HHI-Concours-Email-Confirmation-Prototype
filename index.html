<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Ticket Confirmation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0B1D2E;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input[type="email"] {
    width: 100%;
    padding: 16px 20px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(201,169,110,0.25);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }

  input[type="email"]:focus {
    border-color: #C9A96E;
    box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
  }

  button {
    width: 100%;
    padding: 16px;
    background: #C9A96E;
    color: #0B1D2E;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .skip-link {
    display: block;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    padding: 4px;
    transition: color 0.2s;
  }

  .skip-link:hover { color: rgba(255,255,255,0.6); }

  .status {
    font-size: 13px;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }

  .status.success { background: rgba(58,90,64,0.2); color: #7dcf95; border: 1px solid rgba(58,90,64,0.3); display: block; }
  .status.error   { background: rgba(200,70,70,0.12); color: #e88080; border: 1px solid rgba(200,70,70,0.25); display: block; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(11,29,46,0.3);
    border-top-color: #0B1D2E;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
  <input type="email" id="recipientEmail" placeholder="Enter recipient email" />
  <button id="sendBtn" onclick="sendEmail()">Send Confirmation</button>
  <div class="status" id="statusMsg"></div>
  <a href="email.html" class="skip-link">Skip</a>
</div>

<script>
  // ============================================================
  // 🔧 REPLACE THESE 3 VALUES WITH YOUR EMAILJS CREDENTIALS
  //    Free at: https://www.emailjs.com
  // ============================================================
  const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY";
  const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
  const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
  // ============================================================

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  async function sendEmail() {
    const email  = document.getElementById('recipientEmail').value.trim();
    const btn    = document.getElementById('sendBtn');
    const status = document.getElementById('statusMsg');

    status.className = 'status';

    if (!email) {
      status.className = 'status error';
      status.textContent = '⚠️ Please enter an email address.';
      return;
    }

    if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
      status.className = 'status error';
      status.textContent = '⚙️ EmailJS not configured yet.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending...';

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: email,
        confirmation_no: 'HHI-2026-4829-JH',
        event_dates: 'October 31 – November 1, 2026',
        ticket_type: '2026 Two-Day Ticket — Early Bird Rate',
        total_paid: '$148.00',
      });

      status.className = 'status success';
      status.textContent = `✓ Sent to ${email}`;
      btn.textContent = '✓ Sent!';

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'Send Confirmation';
      }, 4000);

    } catch (err) {
      status.className = 'status error';
      status.textContent = `❌ ${err.text || err.message || 'Failed to send'}`;
      btn.disabled = false;
      btn.textContent = 'Send Confirmation';
    }
  }

  document.getElementById('recipientEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendEmail();
  });
</script>

</body>
</html>
